name: Deploy to Server

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/weltreise-server:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: se2-demo.aau.at
          username: grp-1
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 53200
          envs: GITHUB_TOKEN,REGISTRY_USER
          script: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$REGISTRY_USER" --password-stdin
            docker pull ghcr.io/$REGISTRY_USER/weltreise-server:latest
            docker stop weltreise-server || true
            docker rm weltreise-server || true
            docker run -d \
              -p 53205:8080 \
              -v /home/grp-1/weltreise-data:/data \
              --name weltreise-server \
              --restart unless-stopped \
              ghcr.io/$REGISTRY_USER/weltreise-server:latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.repository_owner }}
